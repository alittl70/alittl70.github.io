<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/default.css">
  <title>Survey | Adventurous Lion</title>
</head>

<body>

<header data-include="../components/header.html"></header>

<main>
  <h2>Adventure Preferences Survey</h2>

  <p>Help us tailor your next adventure experience.</p>

  <form class="form-card">
    <label for="name">Name:</label>
    <input id="name" type="text" placeholder="Enter your name" required>

    <label for="email">Email:</label>
    <input id="email" type="email" placeholder="Enter your email" required>

    <label for="adventure">Favorite Adventure Type:</label>
    <select id="adventure">
      <option>Safari</option>
      <option>Mountain Climbing</option>
      <option>Desert Trek</option>
      <option>Jungle Exploration</option>
    </select>

    <p>Experience Level:</p>
    <label><input type="radio" name="level"> Beginner</label>
    <label><input type="radio" name="level"> Intermediate</label>
    <label><input type="radio" name="level"> Expert</label>

    <label for="comments">Additional Notes:</label>
    <textarea id="comments" rows="4"></textarea>

    <button type="submit">Submit</button>
  </form>
</main>

<footer data-include="../components/footer.html"></footer>

<script src="../itis3135/scripts/include.min.js"></script>
<script src="https://lint.page/kit/4d0fe3.js"></script>

</body>
</html>
